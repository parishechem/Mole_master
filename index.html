<!DOCTYPE html>
<html>
  <head>
    <title>Mole Master by parishe.html</title>
    <meta charset="UTF-8">
  </head>
  <body>
    <center>
      <h2>what you want to calculate?</h2>
      <p>mole, mass or molar mass</p>
      <p>• mole = mass ÷ molar mass</p>
      
      <select id="calcType">
        <option value="mole">mole</option>
        <option value="mass">mass</option>
        <option value="molarMass">molar mass</option>
      </select>
      
      <p>select the element</p>
      <input type="text" id="element" placeholder="H,He,...">
      
      <p>type value of mass</p>
      <input type="number" id="mass" placeholder="1,2..">
      
      <p>type value of mole</p>
      <input type="number" id="mole" placeholder="1,2..">
      
      <br><br>
      <button id="calcButton">calculate</button>
      
      <h3 id="answer"></h3>
      
    </center>

    <script>
      document.getElementById("calcButton").onclick = function() {
        
        let type = document.getElementById("calcType").value;
        let element = document.getElementById("element").value.toUpperCase();
        let mass = document.getElementById("mass").value;
        let mole = document.getElementById("mole").value;
        let molarMass = 0;
        
        let answerBox = document.getElementById("answer");
        
        // Element Database
        if (element == "H") molarMass = 1;
        else if (element == "HE") molarMass = 4;
        else if (element == "C") molarMass = 12;
        else if (element == "N") molarMass = 14;
        else if (element == "O") molarMass = 16;
        else if (element == "NA") molarMass = 23;
        else if (element == "MG") molarMass = 24;
        else if (element == "S") molarMass = 32;
        else if (element == "CL") molarMass = 35.5;
        else if (element == "CA") molarMass = 40;
        else {
          answerBox.innerHTML = "Element galat! H, He, C, N, O, Na, Mg, S, Cl, Ca likho";
          return;
        }
        
        // Calculation
        if (type == "mole") {
          if (mass == "") {
            answerBox.innerHTML = "Mass bharo pehle!";
            return;
          }
          let result = mass / molarMass;
          answerBox.innerHTML = "Mole = " + result.toFixed(3) + " mol";
        }
        
        else if (type == "mass") {
          if (mole == "") {
            answerBox.innerHTML = "Mole bharo pehle!";
            return;
          }
          let result = mole * molarMass;
          answerBox.innerHTML = "Mass = " + result.toFixed(3) + " g";
        }
        
        else if (type == "molarMass") {
          if (mass == "" || mole == "") {
            answerBox.innerHTML = "Mass aur Mole dono bharo!";
            return;
          }
          let result = mass / mole;
          answerBox.innerHTML = "Molar Mass = " + result.toFixed(3) + " g/mol";
        }
      }
    </script>
    
  </body>
            </html>
